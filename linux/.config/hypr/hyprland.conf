env = XCURSOR_SIZE,16
env = HYPRCURSOR_SIZE,16
env = XCURSOR_THEME,Vanilla-DMZ
env = HYPRCURSOR_THEME,Vanilla-DMZ

env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = ELECTRON_ENABLE_WAYLAND,1
env = EDITOR,nvim


exec-once = hypridle
exec-once = hyprlock
exec-once = nm-applet
exec-once = waybar
exec-once = dunst
exec-once = hyprpaper
exec-once = wl-paste --type text --watch cliphist store

exec-once = kitty
exec-once = firefox
exec-once = [workspace special:magic silent] happ
exec-once = [workspace 2 silent] Telegram

source = ~/.config/hypr/mocha.conf
monitor=,preferred,auto,1.67

general {
    gaps_in = 4
    gaps_out = 8

    border_size = 1

    col.active_border = $blue
    col.inactive_border = $crust

    resize_on_border = false
    allow_tearing = false

    layout = dwingle
}

decoration {
    rounding = 4
    active_opacity = 1
    inactive_opacity = 1
    fullscreen_opacity = 1

    blur {
        enabled = true
        size = 2
        passes = 3
        new_optimizations = true
        ignore_opacity = true
    }
}

animations {
    enabled = no

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint
    animation = windowsOut,    1,     1.49,  linear
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  default
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     1,     quick, fade
    animation = layersOut,     1,     1,     quick, fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}


dwindle {
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true 
    disable_splash_rendering = true
    vrr = 0
    enable_swallow = false
}

input {
    kb_layout = us,ru
    kb_variant = colemak,diktor
    kb_options = grp:win_space_toggle

    repeat_rate = 50 
    repeat_delay = 300  

    follow_mouse = 2
    accel_profile = flat
    sensitivity = -0.1 # -1.0 - 1.0

    touchpad {
        natural_scroll = true
        tap-to-click = false
        disable_while_typing = true
        clickfinger_behavior = true
        tap-and-drag = true
        drag_3fg = 0
    }
}

cursor {
    no_warps = true
}

device {
    name = apple-inc.-magic-trackpad
    accel_profile = adaptive
}

gesture = 3, horizontal, workspace
gesture = 3, vertical, special, magic

$mainMod = SUPER
$terminal = kitty
$fileManager = kitty --class yazi yazi
$menu = rofi -show
$calc = rofi -show calc -modi calc -terse -config ~/.config/rofi/config-calc.rasi
$clipboard = cliphist list | cut -d' ' -f2- | rofi -config ~/.config/rofi/config-clip.rasi -dmenu | wl-copy
$hyprshot = hyprshot -o ~/pictures/ -z -s

bind = $mainMod, Q, killactive,
bind = $mainMod, T, exec, $terminal
bind = $mainMod, P, exec, hyprpicker -a
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, C, exec, $calc
bind = $mainMod, V, exec, $clipboard
bind = $mainMod, R, togglefloating,
bind = ALT, SPACE, exec, $menu
bind = , XF86Search, exec, $menu

bind = $mainMod, S, exec, $hyprshot -m active -m output
bind = $mainMod SHIFT, S, exec, $hyprshot -m region
bind = $mainMod CTRL SHIFT, S, exec, $hyprshot -m window

bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod, Tab, focuscurrentorlast
bind = $mainMod, M, togglespecialworkspace, magic
bind = $mainMod SHIFT, M, movetoworkspacesilent, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

workspace = w[tv1]
workspace = f[1]
windowrule {
    name = no-gaps-wtv1
    match:float = false
    match:workspace = w[tv1]

    border_color = $crust
}

windowrule {
    name = no-gaps-f1
    match:float = false
    match:workspace = f[1]

    border_color = $crust
}

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = opacity
    match:class =  ^.*$
    opacity = 0.85
}

windowrule {
    name = kitty-opacity
    match:class = kitty
    opacity = 1.0
}

windowrule {
    name = fullscreen-opacity
    match:fullscreen = true
    opacity = 1.0
}

windowrule {
    name = yazi-float
    match:class = yazi

    float = true
    center = true
}
